# 1. 基础视觉与信息
minimal_mistakes_skin: "default"
locale: "zh-CN"
title: "Jeremy Zhu | Architecture & Research"
title_separator: "-"
name: "Jeremy Zhu"
description: "关注宏观尺度、基础设施与未来空间形态的建筑设计与研究集。"
timezone: "Asia/Shanghai"
permalink: /:categories/:title/

# 2. 个人名片与底栏
author:
  name: "Jer Z"
  avatar: 
  bio: "建筑设计师。倾向于将建筑视为战略性与思辨性的工具，围绕系统性结构、海岸系统与废弃基础设施展开探索。"
  location: "Hangzhou"
  email: "jeremyzhuzs@outlook.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
      url: "mailto:jeremyzhuzs@outlook.com"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/JeremyZHUzs"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/JeremyZHUzs"
  since: "2024"

# 3. 网站承重墙 (维持分页与页面生成的底层插件，切勿修改)
paginate: 5 
paginate_path: /page:num/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      share: true
      related: true
